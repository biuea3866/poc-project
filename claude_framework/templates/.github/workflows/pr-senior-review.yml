name: PR Senior Review Gate

# Layer 2 — PR 머지 전 보안/구조 Critical 선제 차단.
# pr-reviewer 에이전트가 반복적으로 잡아내는 Critical 유형(admin 엔드포인트 권한 누락,
# Controller HttpServletRequest 직접 주입, Listener Repository 직접 주입,
# UseCase/@Service @Transactional 누락)을 휴리스틱으로 기계 차단.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate harness-rules.json
        run: |
          python3 -c 'import json; json.load(open(".claude/harness-rules.json"))' \
            || (echo "::error::harness-rules.json JSON 오류 — Layer 1 훅이 silent pass 하고 있을 수 있습니다." && exit 1)

      - name: Compute diff files
        id: diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- '*.kt' || true)
          {
            echo "changed<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          printf "Changed .kt files:\n%s\n" "$CHANGED"

      - name: Run harness-audit (diff only)
        id: audit
        continue-on-error: true
        run: |
          mkdir -p .analysis/pr-gate
          python3 .claude/scripts/harness-audit.py \
            --diff-files "${{ steps.diff.outputs.changed }}" \
            --format md \
            --fail-on error \
            --out .analysis/pr-gate/audit.md
          echo "audit_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Run senior-gate (structural critical)
        id: senior
        continue-on-error: true
        run: |
          python3 .claude/scripts/senior-gate.py \
            --diff-files "${{ steps.diff.outputs.changed }}" \
            --allow-empty-diff \
            --format md \
            --out .analysis/pr-gate/senior.md
          echo "senior_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Compose PR comment
        if: always()
        run: |
          {
            echo "## Senior Review Gate"
            echo ""
            echo "### Structural Critical (senior-gate.py)"
            cat .analysis/pr-gate/senior.md || echo "no output"
            echo ""
            echo "### Harness Audit (diff)"
            cat .analysis/pr-gate/audit.md || echo "no output"
          } > .analysis/pr-gate/comment.md

      - name: Post or update PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.analysis/pr-gate/comment.md', 'utf8');
            const marker = '<!-- senior-review-gate -->';
            const pr = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const prev = comments.find(c => c.body && c.body.startsWith(marker));
            const full = `${marker}\n${body}`;
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: prev.id, body: full,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr, body: full,
              });
            }

      - name: Fail if critical
        run: |
          AUDIT="${{ steps.audit.outputs.audit_exit }}"
          SENIOR="${{ steps.senior.outputs.senior_exit }}"
          if [ "$AUDIT" != "0" ] || [ "$SENIOR" != "0" ]; then
            echo "::error::Senior Review Gate FAIL (audit=$AUDIT senior=$SENIOR)"
            exit 1
          fi
