# development 환경 오버라이드
# 사용법: docker compose -f docker-compose.yml -f docker-compose.development.yml up --build -d
services:
  wiki-api:
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: development
    build:
      context: .
      dockerfile: docker/wiki-api/Dockerfile

  wiki-mysql:
    ports:
      - "3307:3306"

  wiki-redis:
    ports:
      - "6380:6379"
