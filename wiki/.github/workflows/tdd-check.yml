name: TDD Check

on:
  pull_request:
    branches: [development, main]
    types: [opened, synchronize, reopened, edited]

jobs:
  tdd-enforcement:
    name: TDD Enforcement Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check test files exist for changed sources
        id: test-check
        run: |
          echo "Checking TDD compliance..."

          # Get changed files vs base branch
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          MISSING_TESTS=""
          VIOLATIONS=0

          # Check BE: for each changed .kt source file, verify test exists
          while IFS= read -r file; do
            # Skip test files, build files, config files
            if [[ "$file" =~ /test/ ]] || [[ "$file" =~ build.gradle ]] || [[ "$file" =~ \.yml ]] || [[ "$file" =~ \.yaml ]] || [[ "$file" =~ \.md ]]; then
              continue
            fi

            # BE Kotlin source files
            if [[ "$file" =~ \.kt$ ]] && [[ "$file" =~ /main/ ]]; then
              # Derive test file path
              TEST_FILE="${file/\/main\//\/test\/}"
              TEST_FILE="${TEST_FILE%.kt}Test.kt"

              # Check if any test file was changed for this source
              if echo "$CHANGED_FILES" | grep -q "Test\.kt"; then
                echo "✅ Tests found for BE changes"
              else
                echo "⚠️  Warning: BE source changed but no test files in PR: $file"
                MISSING_TESTS="${MISSING_TESTS}\n- $file"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
              break  # Only check once for BE changes
            fi

            # FE TypeScript/TSX source files
            if ([[ "$file" =~ \.tsx?$ ]] || [[ "$file" =~ \.ts$ ]]) && [[ "$file" =~ src/ ]] && ! [[ "$file" =~ __tests__ ]] && ! [[ "$file" =~ \.test\. ]] && ! [[ "$file" =~ \.d\.ts ]]; then
              if echo "$CHANGED_FILES" | grep -q "\.test\.ts"; then
                echo "✅ Tests found for FE changes"
              else
                echo "⚠️  Warning: FE source changed but no test files in PR: $file"
                MISSING_TESTS="${MISSING_TESTS}\n- $file"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
              break  # Only check once for FE changes
            fi
          done <<< "$CHANGED_FILES"

          echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
          echo "missing_tests=$MISSING_TESTS" >> $GITHUB_OUTPUT

      - name: Check PR description has test cases
        id: pr-desc-check
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            const hasTestCases = body.includes('Test Cases') || body.includes('테스트 케이스');
            const hasTestCoverage = body.includes('Test Coverage') || body.includes('테스트');

            if (!hasTestCases) {
              core.setOutput('missing_section', 'true');
              console.log('⚠️  PR description is missing Test Cases section');
            } else {
              core.setOutput('missing_section', 'false');
              console.log('✅ PR description has Test Cases section');
            }

      - name: Comment on PR — TDD violation
        if: steps.test-check.outputs.violations != '0' || steps.pr-desc-check.outputs.missing_section == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const violations = '${{ steps.test-check.outputs.violations }}';
            const missingSection = '${{ steps.pr-desc-check.outputs.missing_section }}';
            const missingTests = `${{ steps.test-check.outputs.missing_tests }}`;

            const lines = [
              '## 🚫 TDD 규칙 위반',
              '',
              '이 PR은 TDD 규칙을 충족하지 않습니다.',
              '',
            ];

            if (missingSection === 'true') {
              lines.push('### ❌ PR 설명에 테스트 케이스 섹션 없음');
              lines.push('PR 설명에 **Test Cases** 섹션을 추가하고 Jira 테스트 케이스를 체크리스트로 기재하세요.');
              lines.push('');
            }

            if (violations !== '0') {
              lines.push('### ❌ 소스 변경에 대응하는 테스트 코드 없음');
              lines.push('소스 파일을 변경했으면 반드시 테스트 파일도 함께 PR에 포함해야 합니다.');
              lines.push('');
              lines.push('**테스트가 없는 변경:**');
              lines.push('```');
              lines.push(missingTests.replace(/\\n/g, '\n'));
              lines.push('```');
            }

            lines.push('');
            lines.push('### 규칙');
            lines.push('- BE: 모든 소스 변경 → `*Test.kt` 또는 `*IntegrationTest.kt` 필수');
            lines.push('- FE: 모든 소스 변경 → `*.test.ts` / `*.test.tsx` 필수');
            lines.push('- PR 설명: **Test Cases** 섹션에 Jira 테스트 케이스 체크리스트 필수');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: lines.join('\n'),
            });

      - name: Fail if TDD violations
        if: steps.test-check.outputs.violations != '0' || steps.pr-desc-check.outputs.missing_section == 'true'
        run: |
          echo "TDD violations detected. Please add test code before merging."
          exit 1
