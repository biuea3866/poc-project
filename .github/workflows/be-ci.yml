name: BE CI

on:
  push:
    branches:
      - 'feat/**'
      - main
    paths:
      - 'wiki/wiki-domain/**'
      - 'wiki/wiki-api/**'
      - 'wiki/build.gradle.kts'
      - 'wiki/settings.gradle.kts'
  pull_request:
    branches: [main]
    paths:
      - 'wiki/wiki-domain/**'
      - 'wiki/wiki-api/**'
      - 'wiki/build.gradle.kts'
      - 'wiki/settings.gradle.kts'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('wiki/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and Test
        working-directory: wiki
        run: ./gradlew :wiki-api:build --no-daemon

  docker-build:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        working-directory: wiki
        run: ./gradlew :wiki-api:bootJar --no-daemon -x test

      - name: Build Docker Image
        working-directory: wiki
        run: docker build -t ai-wiki-api:latest -f docker/Dockerfile .
