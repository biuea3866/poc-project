name: BE CI

on:
  push:
    branches: [main]
    paths: ['be/**']
  pull_request:
    branches: [main]
    paths: ['be/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('be/**/*.gradle.kts') }}

      - name: Build and Test
        working-directory: be
        run: ./gradlew build --no-daemon

  docker-build:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        working-directory: be
        run: ./gradlew :apps:api:bootJar --no-daemon

      - name: Build Docker Image
        working-directory: be
        run: docker build -t ai-wiki-api:latest -f apps/api/Dockerfile .
