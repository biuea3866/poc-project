name: FE CI

on:
  push:
    branches: [main]
    paths: ['fe/**']
  pull_request:
    branches: [main]
    paths: ['fe/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        working-directory: fe
        run: npm ci

      - name: Type check
        working-directory: fe
        run: npx tsc --noEmit

      - name: Build
        working-directory: fe
        run: npm run build
