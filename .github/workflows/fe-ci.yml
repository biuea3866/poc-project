name: FE CI

on:
  push:
    branches:
      - 'feat/**'
      - development
    paths:
      - 'wiki/frontend/**'
  pull_request:
    branches: [development, main]
    paths:
      - 'wiki/frontend/**'

jobs:
  # ──────────────────────────────────────────────
  # 1. Build + Type check
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wiki/frontend/package-lock.json

      - name: Install dependencies
        working-directory: wiki/frontend
        run: npm ci

      - name: Type check
        working-directory: wiki/frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: wiki/frontend
        run: npm run build

  # ──────────────────────────────────────────────
  # 2. PR 본문 테스트 케이스 검증
  #    PR 본문의 체크리스트 항목을 추출하여 빌드 결과와 함께 코멘트
  # ──────────────────────────────────────────────
  pr-test-case-check:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wiki/frontend/package-lock.json

      - name: Install dependencies
        working-directory: wiki/frontend
        run: npm ci

      - name: Extract test cases from PR body
        id: extract
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "$PR_BODY" > /tmp/pr_body.txt
          TOTAL=$(grep -cE '^\s*- \[[ x]\]' /tmp/pr_body.txt || echo 0)
          CHECKED=$(grep -cE '^\s*- \[x\]' /tmp/pr_body.txt || echo 0)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "checked=$CHECKED" >> $GITHUB_OUTPUT

          python3 - <<'PYEOF'
          import re, os

          body = open('/tmp/pr_body.txt').read()
          items = re.findall(r'^\s*- \[([ x])\]\s*(.+)$', body, re.MULTILINE)

          output = []
          for checked, text in items:
              icon = '✅' if checked == 'x' else '⬜'
              output.append(f'{icon} {text.strip()}')

          result = '\n'.join(output) if output else '(체크리스트 항목 없음)'
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write('CHECKLIST<<EOF\n')
              f.write(result + '\n')
              f.write('EOF\n')
          PYEOF

      - name: Type check (PR verification)
        id: typecheck
        working-directory: wiki/frontend
        run: |
          npx tsc --noEmit 2>&1 | tee /tmp/tsc_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Run unit tests (if exist)
        id: test
        working-directory: wiki/frontend
        run: |
          # package.json에 test 스크립트 있으면 실행, 없으면 skip
          if npm run | grep -q '^\s*test$'; then
            npm test -- --watchAll=false --passWithNoTests 2>&1 | tee /tmp/test_output.txt
            if [ ${PIPESTATUS[0]} -eq 0 ]; then
              echo "status=✅ PASSED" >> $GITHUB_OUTPUT
            else
              echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            fi
          else
            echo "status=⏭️ SKIPPED (no test script)" >> $GITHUB_OUTPUT
          fi

      - name: Lint check (if eslint configured)
        id: lint
        working-directory: wiki/frontend
        run: |
          if npm run | grep -q '^\s*lint$'; then
            npm run lint 2>&1 | tee /tmp/lint_output.txt
            if [ ${PIPESTATUS[0]} -eq 0 ]; then
              echo "status=✅ PASSED" >> $GITHUB_OUTPUT
            else
              echo "status=⚠️ WARNINGS" >> $GITHUB_OUTPUT
            fi
          else
            echo "status=⏭️ SKIPPED" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with test case results
        uses: actions/github-script@v7
        with:
          script: |
            const testStatus = '${{ steps.test.outputs.status }}';
            const lintStatus = '${{ steps.lint.outputs.status }}';
            const total   = '${{ steps.extract.outputs.total }}';
            const checked = '${{ steps.extract.outputs.checked }}';
            const checklist = process.env.CHECKLIST;

            const body = [
              `## ✅ FE CI — 빌드 & 테스트 결과`,
              '',
              '### 검증 항목',
              '| 항목 | 결과 |',
              '|------|------|',
              '| TypeScript 타입 체크 | ✅ PASSED |',
              '| Next.js 빌드 | ✅ PASSED |',
              `| 단위 테스트 | ${testStatus} |`,
              `| Lint | ${lintStatus} |`,
              '',
              '### PR 본문 테스트 케이스',
              `> 총 ${total}개 항목 중 ${checked}개 완료 기준 충족`,
              '',
              checklist || '(체크리스트 항목 없음)',
              '',
              `> 🤖 Verified by FE CI — commit \`${{ github.sha }}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('FE CI — 빌드 & 테스트 결과')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
