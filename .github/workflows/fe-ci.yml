name: FE CI

on:
  push:
    branches:
      - 'feat/**'
      - main
    paths:
      - 'wiki/frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'wiki/frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wiki/frontend/package-lock.json

      - name: Install dependencies
        working-directory: wiki/frontend
        run: npm ci

      - name: Type check
        working-directory: wiki/frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: wiki/frontend
        run: npm run build
