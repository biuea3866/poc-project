name: Jira Branch & PR Sync

on:
  push:
    branches:
      - 'feat/**'
      - development
      - main
  pull_request:
    types: [opened, reopened, closed, synchronize]
  create:

jobs:
  # ──────────────────────────────────────────────
  # Branch created → Jira 티켓 진행 중 + 브랜치 링크
  # ──────────────────────────────────────────────
  link-branch-to-jira:
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    env:
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
    steps:
      - name: Extract Jira ticket from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.ref }}"
          TICKET=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          echo "ticket=$TICKET" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Extracted: $TICKET from $BRANCH"

      - name: Transition Jira to In Progress
        if: steps.extract.outputs.ticket != ''
        continue-on-error: true
        run: |
          AUTH=$(echo -n "${JIRA_EMAIL}:${JIRA_API_TOKEN}" | base64)
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"transition":{"id":"21"}}' \
            "https://${JIRA_DOMAIN}/rest/api/3/issue/${{ steps.extract.outputs.ticket }}/transitions"

      - name: Add branch comment to Jira
        if: steps.extract.outputs.ticket != ''
        continue-on-error: true
        env:
          TICKET: ${{ steps.extract.outputs.ticket }}
          BRANCH: ${{ steps.extract.outputs.branch }}
        run: |
          AUTH=$(echo -n "${JIRA_EMAIL}:${JIRA_API_TOKEN}" | base64)
          REPO="https://github.com/${{ github.repository }}"
          BODY=$(python3 -c "
          import json, os
          b = os.environ['BRANCH']
          repo = os.environ['REPO']
          payload = {'body': {'type': 'doc', 'version': 1, 'content': [{'type': 'paragraph', 'content': [
            {'type': 'text', 'text': 'Branch created: '},
            {'type': 'text', 'text': b, 'marks': [{'type': 'code'}]},
            {'type': 'text', 'text': ' -- ' + repo + '/tree/' + b}
          ]}]}}
          print(json.dumps(payload))
          " REPO="$REPO")
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -d "${BODY}" \
            "https://${JIRA_DOMAIN}/rest/api/3/issue/${TICKET}/comment"

  # ──────────────────────────────────────────────
  # PR 상태 → Jira 티켓 상태 자동 전환
  # ──────────────────────────────────────────────
  sync-pr-status-to-jira:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
    steps:
      - name: Extract Jira ticket from PR
        id: extract
        run: |
          TICKET=$(echo \
            "${{ github.event.pull_request.title }} \
             ${{ github.event.pull_request.body }} \
             ${{ github.event.pull_request.head.ref }}" \
            | grep -oE '[A-Z]+-[0-9]+' | head -1)
          echo "ticket=$TICKET" >> $GITHUB_OUTPUT
          echo "Extracted: $TICKET"

      - name: PR Opened/Reopened → 진행 중
        if: |
          steps.extract.outputs.ticket != '' &&
          (github.event.action == 'opened' || github.event.action == 'reopened')
        continue-on-error: true
        run: |
          AUTH=$(echo -n "${JIRA_EMAIL}:${JIRA_API_TOKEN}" | base64)
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"transition":{"id":"21"}}' \
            "https://${JIRA_DOMAIN}/rest/api/3/issue/${{ steps.extract.outputs.ticket }}/transitions"

      - name: PR Merged → 완료
        if: |
          steps.extract.outputs.ticket != '' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true
        continue-on-error: true
        run: |
          AUTH=$(echo -n "${JIRA_EMAIL}:${JIRA_API_TOKEN}" | base64)
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"transition":{"id":"31"}}' \
            "https://${JIRA_DOMAIN}/rest/api/3/issue/${{ steps.extract.outputs.ticket }}/transitions"

      - name: PR Closed without Merge → 해야 할 일
        if: |
          steps.extract.outputs.ticket != '' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == false
        continue-on-error: true
        run: |
          AUTH=$(echo -n "${JIRA_EMAIL}:${JIRA_API_TOKEN}" | base64)
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"transition":{"id":"11"}}' \
            "https://${JIRA_DOMAIN}/rest/api/3/issue/${{ steps.extract.outputs.ticket }}/transitions"

      - name: Add PR link comment to Jira
        if: |
          steps.extract.outputs.ticket != '' &&
          github.event.action == 'opened'
        continue-on-error: true
        env:
          TICKET: ${{ steps.extract.outputs.ticket }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          AUTH=$(echo -n "${JIRA_EMAIL}:${JIRA_API_TOKEN}" | base64)
          BODY=$(python3 -c "
          import json, os
          title = os.environ['PR_TITLE']
          url   = os.environ['PR_URL']
          payload = {'body': {'type': 'doc', 'version': 1, 'content': [{'type': 'paragraph', 'content': [
            {'type': 'text', 'text': 'PR opened: '},
            {'type': 'text', 'text': title, 'marks': [{'type': 'link', 'attrs': {'href': url}}]}
          ]}]}}
          print(json.dumps(payload))
          ")
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -d "${BODY}" \
            "https://${JIRA_DOMAIN}/rest/api/3/issue/${TICKET}/comment"
