server:
  port: 8087

spring:
  application:
    name: closet-review
  datasource:
    url: jdbc:mysql://localhost:3306/closet_review?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 30MB

review:
  image:
    upload-dir: ./uploads/reviews

storage:
  endpoint: http://localhost:9000
  access-key: closet-admin
  secret-key: closet-secret-key
  region: ap-northeast-2
  product-bucket: closet-product-images
  review-bucket: closet-review-images

logging:
  level:
    com.closet: DEBUG
    org.springframework.kafka: INFO
