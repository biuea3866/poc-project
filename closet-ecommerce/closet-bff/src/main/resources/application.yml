server:
  port: 8085

spring:
  application:
    name: closet-bff
  threads:
    virtual:
      enabled: true
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

service:
  member:
    url: http://localhost:8081/api/v1
  product:
    url: http://localhost:8082/api/v1
  order:
    url: http://localhost:8083/api/v1
  payment:
    url: http://localhost:8084/api/v1
  shipping:
    url: http://localhost:8086/api/v1
  inventory:
    url: http://localhost:8087/api/v1
  search:
    url: http://localhost:8088/api/v1
  review:
    url: http://localhost:8089/api/v1
  promotion:
    url: http://localhost:8090/api/v1
  display:
    url: http://localhost:8091/api/v1
  seller:
    url: http://localhost:8092/api/v1
  cs:
    url: http://localhost:8093/api/v1
  settlement:
    url: http://localhost:8094/api/v1
  notification:
    url: http://localhost:8095/api/v1
  content:
    url: http://localhost:8096/api/v1
