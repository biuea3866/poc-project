services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: closet
      MYSQL_DATABASE: closet
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pcloset"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  elasticsearch:
    image: elasticsearch:8.11.0
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  # === Monitoring Stack ===
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: closet
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki

  tempo:
    image: grafana/tempo:2.3.0
    ports:
      - "3200:3200"   # Tempo API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo

  zipkin:
    image: openzipkin/zipkin:latest
    ports:
      - "9411:9411"

  # MySQL exporter
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.0
    ports:
      - "9104:9104"
    environment:
      MYSQLD_EXPORTER_PASSWORD: closet
    command:
      - "--mysqld.address=mysql:3306"
      - "--mysqld.username=root"
    depends_on:
      mysql:
        condition: service_healthy

  # Redis exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis:6379"
    depends_on:
      - redis

  # Kafka exporter
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    ports:
      - "9308:9308"
    command: --kafka.server=kafka:9092
    depends_on:
      - kafka

  # Node exporter (host metrics)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'

  # === Application Services (17개) ===

  # Phase 1: Core
  closet-member:
    build: { context: ../closet-member }
    ports: ["8081:8081"]
    environment: { SPRING_PROFILES_ACTIVE: docker,kafka }
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_started }
      kafka: { condition: service_started }

  closet-product:
    build: { context: ../closet-product }
    ports: ["8082:8082"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      mysql: { condition: service_healthy }

  closet-order:
    build: { context: ../closet-order }
    ports: ["8083:8083"]
    environment: { SPRING_PROFILES_ACTIVE: docker,kafka }
    depends_on:
      mysql: { condition: service_healthy }
      kafka: { condition: service_started }

  closet-payment:
    build: { context: ../closet-payment }
    ports: ["8084:8084"]
    environment: { SPRING_PROFILES_ACTIVE: docker,kafka }
    depends_on:
      mysql: { condition: service_healthy }
      kafka: { condition: service_started }

  closet-bff:
    build: { context: ../closet-bff }
    ports: ["8085:8085"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      - closet-member
      - closet-product
      - closet-order
      - closet-payment

  closet-gateway:
    build: { context: ../closet-gateway }
    ports: ["8080:8080"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      - closet-bff

  # Phase 2: Growth
  closet-shipping:
    build: { context: ../closet-shipping }
    ports: ["8086:8086"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      mysql: { condition: service_healthy }

  closet-inventory:
    build: { context: ../closet-inventory }
    ports: ["8087:8087"]
    environment: { SPRING_PROFILES_ACTIVE: docker,kafka }
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_started }
      kafka: { condition: service_started }

  closet-search:
    build: { context: ../closet-search }
    ports: ["8088:8088"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      - elasticsearch

  closet-review:
    build: { context: ../closet-review }
    ports: ["8089:8089"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      mysql: { condition: service_healthy }

  # Phase 3: Expansion
  closet-promotion:
    build: { context: ../closet-promotion }
    ports: ["8090:8090"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_started }

  closet-display:
    build: { context: ../closet-display }
    ports: ["8091:8091"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_started }

  closet-seller:
    build: { context: ../closet-seller }
    ports: ["8092:8092"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      mysql: { condition: service_healthy }

  closet-cs:
    build: { context: ../closet-cs }
    ports: ["8093:8093"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      mysql: { condition: service_healthy }

  # Phase 4: Advanced
  closet-settlement:
    build: { context: ../closet-settlement }
    ports: ["8094:8094"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      mysql: { condition: service_healthy }

  closet-notification:
    build: { context: ../closet-notification }
    ports: ["8095:8095"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      mysql: { condition: service_healthy }

  closet-content:
    build: { context: ../closet-content }
    ports: ["8096:8096"]
    environment: { SPRING_PROFILES_ACTIVE: docker }
    depends_on:
      mysql: { condition: service_healthy }

volumes:
  mysql-data:
  es-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
