services:
  signoz-clickhouse:
    image: clickhouse/clickhouse-server:23.11-alpine
    container_name: signoz-clickhouse
    ports:
      - "9001:9000"
      - "8123:8123"
    volumes:
      - signoz-clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:latest
    container_name: signoz-otel-collector
    ports:
      - "14317:4317"
      - "14318:4318"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=signoz-clickhouse:9000
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    restart: on-failure

  signoz-query-service:
    image: signoz/query-service:latest
    container_name: signoz-query-service
    ports:
      - "8180:8080"
    environment:
      - SIGNOZ_TELEMETRYSTORE_PROVIDER=clickhouse
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
      - SIGNOZ_SQLSTORE_PROVIDER=sqlite
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
    volumes:
      - signoz-data:/var/lib/signoz
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    restart: on-failure

  signoz-frontend:
    image: signoz/frontend:latest
    container_name: signoz-frontend
    ports:
      - "3301:3301"
    depends_on:
      - signoz-query-service
    restart: on-failure

volumes:
  signoz-clickhouse:
  signoz-data:
