server:
  port: 8080

spring:
  application:
    name: closet-gateway
  cloud:
    gateway:
      routes:
        - id: member-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/members/**, /api/v1/members/auth/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**, /api/v1/brands/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**, /api/v1/carts/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**
        - id: bff-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/bff/**
        - id: inventory-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/inventories/**
        - id: shipping-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/shippings/**

jwt:
  secret: closet-member-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256

# 서비스 간 내부 API 인증 키 (환경변수로 외부화)
internal:
  api:
    key: ${INTERNAL_API_KEY:closet-internal-api-secret-key-for-service-to-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
