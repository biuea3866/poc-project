server:
  port: 8080

spring:
  application:
    name: closet-gateway
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter:
              replenishRate: 10
              burstCapacity: 20
      routes:
        - id: member-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/members/**, /api/v1/members/auth/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**, /api/v1/brands/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**, /api/v1/carts/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**
        - id: bff-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/bff/**

jwt:
  secret: closet-jwt-secret-key-for-development-only-32bytes!!

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
