spring:
  cloud:
    gateway:
      routes:
        - id: member-service
          uri: http://closet-member:8081
          predicates:
            - Path=/api/v1/members/**, /api/v1/members/auth/**
        - id: product-service
          uri: http://closet-product:8082
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**, /api/v1/brands/**
        - id: order-service
          uri: http://closet-order:8083
          predicates:
            - Path=/api/v1/orders/**, /api/v1/carts/**
        - id: payment-service
          uri: http://closet-payment:8084
          predicates:
            - Path=/api/v1/payments/**
        - id: bff-service
          uri: http://closet-bff:8085
          predicates:
            - Path=/api/v1/bff/**
