name: CI

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  build-member:
    name: Build & Test closet-member
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Build closet-member
        run: ./gradlew :closet-member:build
      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Member Test Results
          path: closet-member/build/test-results/test/*.xml
          reporter: java-junit

  build-product:
