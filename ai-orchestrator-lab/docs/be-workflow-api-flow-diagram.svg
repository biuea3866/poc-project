<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520"><defs><style>.t{font:700 28px sans-serif;fill:#102a43}.l{font:600 17px sans-serif;fill:#102a43}.s{font:500 14px sans-serif;fill:#486581}.b{fill:#fff;stroke:#486581;stroke-width:2.5;rx:16;ry:16}.d{fill:#fff7ed;stroke:#dd6b20;stroke-width:2.5}.ln{stroke:#243b53;stroke-width:3.5;fill:none;marker-end:url(#a)}</style><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#243b53"/></marker></defs><rect width="1200" height="520" fill="#f4f7fb"/><text x="60" y="55" class="t">BE 워크플로 API 플로우</text><rect x="90" y="100" width="210" height="80" class="b"/><text x="120" y="145" class="l">1. 생성 요청 수신</text><text x="125" y="168" class="s">POST /workflow-runs</text><rect x="360" y="100" width="210" height="80" class="b"/><text x="405" y="145" class="l">2. 요청 검증</text><text x="417" y="168" class="s">payload validate</text><polygon points="730,90 840,140 730,190 620,140" class="d"/><text x="690" y="136" class="l">유효한 요청인가?</text><text x="709" y="159" class="s">실패 시 4xx</text><rect x="900" y="100" width="220" height="80" class="b"/><text x="925" y="145" class="l">3. 실행/단계 초기화</text><text x="948" y="168" class="s">domain object 생성</text><rect x="900" y="290" width="220" height="80" class="b"/><text x="938" y="335" class="l">4. 저장 후 응답</text><text x="942" y="358" class="s">entity persist</text><rect x="360" y="290" width="240" height="80" class="b"/><text x="410" y="335" class="l">에러 응답 반환</text><path d="M300 140 H360" class="ln"/><path d="M570 140 H620" class="ln"/><path d="M840 140 H900" class="ln"/><path d="M1010 180 V290" class="ln"/><path d="M730 190 V290 H600" class="ln"/></svg>
