# Spring AI PoC 인프라 — Ollama + 외부 MCP 서버.
#
# Spring 앱(spring-ai-practice)은 호스트에서 `./gradlew bootRun` 으로 띄우고
# 여기서 노출된 포트(11434, 9090)를 그대로 사용한다.
#
# 사용:
#   docker compose up -d                   # 백그라운드로 두 서비스 기동
#   docker compose logs -f ollama-pull     # 모델 다운로드 진행 보기
#   docker compose down                    # 종료
#   docker compose down -v                 # 종료 + 볼륨까지 삭제 (모델 재다운로드)
#
# 모델은 ollama-data 볼륨에 영속화 — 두 번째 기동부터는 빠르다.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: spring-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  # 필요한 모델을 1회 pull 한 뒤 종료하는 init 컨테이너.
  # ollama 서비스가 healthy 가 되면 실행되고, 모델 받기 끝나면 자동 종료.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: spring-ai-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export OLLAMA_HOST=http://ollama:11434
        echo "▶ pulling llama3.2:3b (channel 채팅 + 도구 콜링)" && ollama pull llama3.2:3b
        echo "▶ pulling nomic-embed-text (RAG 임베딩)"          && ollama pull nomic-embed-text
        echo "(선택) llava:7b 는 용량이 커서 자동 pull 안함. 멀티모달 시연 시 'docker compose exec ollama ollama pull llava:7b' 실행."
        echo "✓ 모델 준비 완료"

  mcp-external-server:
    build:
      context: ./mcp-external-server
    container_name: spring-ai-mcp-external
    ports:
      - "9090:9090"
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "9090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9090/sse', timeout=2)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  ollama-data:
    name: spring-ai-ollama-data
