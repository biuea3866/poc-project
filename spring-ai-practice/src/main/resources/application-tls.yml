# TLS 프로필 — 자체서명 인증서로 HTTPS 활성화 (PoC 학습용).
#
# 사용 순서:
#   1) 자체서명 인증서 생성 (PoC 1회):
#      keytool -genkeypair -alias mcp -keyalg RSA -keysize 2048 -validity 365 \
#        -storetype PKCS12 -keystore src/main/resources/keystore.p12 \
#        -storepass changeit -dname "CN=localhost"
#   2) 실행:
#      ./gradlew bootRun --args='--spring.profiles.active=tls'
#   3) 클라이언트 (자체서명이라 검증 비활성 필요):
#      curl -k https://localhost:8443/auth/login ...
#      Python MCP 클라이언트는 ssl.create_default_context() 의 check_hostname/verify_mode 조정 필요.
#
# 운영에서는 자체서명 대신 정식 인증서(또는 nginx/Cloudflare 종단)로 교체한다.
server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-type: PKCS12
    key-store-password: ${KEYSTORE_PASSWORD:changeit}
    key-alias: mcp
